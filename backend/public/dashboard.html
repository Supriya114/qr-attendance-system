<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="topbar">
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

    <h2>Dashboard</h2>

    <button onclick="window.location.href='/qr'">QR Scanner</button>
    <button onclick="window.location.href='/student-qr'">Generate QR</button>
    <button onclick="window.location.href='/attendance'">Attendance Manager</button>

</div>

<script>
function logout(){
    localStorage.removeItem("token");
    window.location.href="/login";
}
</script>

</body>
</html>
